<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood → Playlist</title>
<meta name="description" content="Pick a mood, get a playlist idea. A tiny project by Maya Chen.">
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #faf7f2;
    --card: #ffffff;
    --line: #e6e0d6;
    --accent: #c2410c;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    background: var(--paper);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    transition: background 0.6s ease;
  }
  .top {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  h1 { font-size: clamp(30px, 6vw, 42px); margin: 0 0 6px; letter-spacing: -0.02em; text-align: center; }
  .sub { color: #6b6b64; margin: 0 0 30px; text-align: center; }
  .moods {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
    width: 100%;
    max-width: 520px;
  }
  button.mood {
    font-family: inherit;
    font-size: 17px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 12px;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  button.mood:hover { transform: translateY(-3px); border-color: var(--accent); }
  button.mood .emoji { display: block; font-size: 30px; margin-bottom: 6px; }

  .result {
    margin-top: 34px;
    width: 100%;
    max-width: 520px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 26px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .result.show { opacity: 1; transform: translateY(0); }
  .result h2 { margin: 0 0 4px; font-size: 24px; }
  .result .tagline { font-family: ui-monospace, Menlo, monospace; font-size: 13px; color: #6b6b64; margin: 0 0 16px; }
  .result ol { margin: 0; padding-left: 22px; line-height: 1.9; }
  .result li::marker { color: var(--accent); font-family: ui-monospace, Menlo, monospace; }
  .again {
    margin-top: 18px;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 13px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 8px 14px;
    border-radius: 7px;
    cursor: pointer;
  }
  footer {
    margin-top: auto;
    padding-top: 40px;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 12px;
    color: #9a9a90;
    text-align: center;
  }
  footer a { color: #9a9a90; }
</style>
</head>
<body>
  <p class="top">a tiny thing I built</p>
  <h1>How are you feeling?</h1>
  <p class="sub">Pick a mood. I'll build you a playlist idea.</p>

  <div class="moods" id="moods"></div>

  <div class="result" id="result" role="status" aria-live="polite">
    <h2 id="r-title"></h2>
    <p class="tagline" id="r-tag"></p>
    <ol id="r-list"></ol>
    <button class="again" onclick="reset()">← pick another mood</button>
  </div>

  <footer>
    Made by Maya · Agents 101 · <a href="../../index.html">back to portfolio</a>
  </footer>

<script>
  var MOODS = {
    happy:    { emoji: "☀️", label: "Happy",    color: "#fff8e6", tag: "bright, bouncy, windows-down energy",
                songs: ["Something upbeat you can't sit still to", "That song from a summer road trip", "A cover that's better than the original", "The one everyone knows the words to"] },
    focused:  { emoji: "🎯", label: "Focused",  color: "#eef4f0", tag: "lo-fi, no lyrics, get-it-done",
                songs: ["Instrumental beats, low and steady", "Rain sounds + soft piano", "A movie score that makes homework feel epic", "One long ambient track so you stop skipping"] },
    chill:    { emoji: "🌊", label: "Chill",    color: "#eaf1f5", tag: "slow, warm, no rush",
                songs: ["Acoustic and unhurried", "Something your parents secretly like too", "A song that sounds like golden hour", "The one you save for the walk home"] },
    hyped:    { emoji: "⚡", label: "Hyped",    color: "#fdeee6", tag: "loud, fast, pre-game",
                songs: ["Max volume, no apologies", "The drop everyone waits for", "A throwback that still goes hard", "Something to sprint to"] },
    sad:      { emoji: "🌧️", label: "In my feels", color: "#eef0f4", tag: "quiet, honest, a little dramatic",
                songs: ["A song that gets it", "Piano and one sad violin", "The one you play twice in a row", "Something to stare out the window to"] },
    creative: { emoji: "🎨", label: "Creative", color: "#f3eef7", tag: "weird, wonderful, sketchbook open",
                songs: ["Something you can't quite categorize", "An artist nobody else has heard of yet", "A song in a language you don't speak", "The one that makes you want to make something"] }
  };

  var moodsEl = document.getElementById("moods");
  Object.keys(MOODS).forEach(function(key){
    var m = MOODS[key];
    var b = document.createElement("button");
    b.className = "mood";
    b.innerHTML = '<span class="emoji">' + m.emoji + '</span>' + m.label;
    b.onclick = function(){ pick(key); };
    moodsEl.appendChild(b);
  });

  function pick(key){
    var m = MOODS[key];
    document.body.style.background = m.color;
    document.getElementById("r-title").textContent = m.emoji + " " + m.label + " playlist";
    document.getElementById("r-tag").textContent = m.tag;
    var list = document.getElementById("r-list");
    list.innerHTML = "";
    m.songs.forEach(function(s){
      var li = document.createElement("li");
      li.textContent = s;
      list.appendChild(li);
    });
    document.getElementById("result").classList.add("show");
    document.getElementById("result").scrollIntoView({ behavior: "smooth", block: "center" });
  }

  function reset(){
    document.body.style.background = "";
    document.getElementById("result").classList.remove("show");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
</script>
</body>
</html>
